name: Test

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (Linux headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest --cov=gitmove --cov-report=term-missing -q

      - name: Run tests
        if: runner.os != 'Linux'
        run: python -m pytest --cov=gitmove --cov-report=term-missing -q
